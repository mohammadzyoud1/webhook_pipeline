version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123321
      POSTGRES_DB: webhook
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build: .
    command: npx drizzle-kit migrate
    environment:
      - DB_URL=postgres://postgres:123321@postgres:5432/webhook
    depends_on:
      - postgres
    restart: "no"
  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      - DB_URL=postgres://postgres:123321@postgres:5432/webhook
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy

  worker:
    build: .
    command: node dist/worker/worker.js
    environment:
      - DB_URL=postgres://postgres:123321@postgres:5432/webhook
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy

volumes:
  pgdata:
